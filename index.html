<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OnboardFlow | Acceso</title><style>:root{--navy:#0B132B;--copper:#C9782A;--muted:#667085;--display:Georgia,serif;--body:Inter,system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,var(--navy),#1b294d);font-family:var(--body);padding:18px}.card{width:min(480px,100%);background:white;border-radius:28px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.brand{font-family:var(--display);font-size:26px;color:var(--navy)}h1{font-family:var(--display);font-size:38px;color:var(--navy);margin:28px 0 6px}.sub,.note{color:var(--muted)}label{display:block;font-size:13px;font-weight:800;margin:16px 0 6px}input{width:100%;min-height:49px;border:1px solid #d6d2c8;border-radius:15px;padding:12px 14px;font:inherit}button{width:100%;min-height:49px;border:0;border-radius:15px;background:var(--copper);color:white;font-weight:900;margin-top:20px;cursor:pointer}.note{font-size:12px;margin-top:15px}.error{color:#b42318;font-size:13px;margin-top:12px;display:none}.loading{opacity:.65;pointer-events:none}</style></head><body><main class="card"><div class="brand">LillyTech · OnboardFlow</div><h1>Bienvenido</h1><p class="sub">Ingrese con la cuenta asignada por su empresa. El sistema abrirá la vista correspondiente a su rol.</p><form id="loginForm"><label for="email">Correo</label><input id="email" type="email" autocomplete="username" required><label for="password">Contraseña</label><input id="password" type="password" autocomplete="current-password" required><button id="loginButton">Ingresar de forma segura</button></form><div id="error" class="error" role="alert"></div><div class="note">¿No tiene cuenta o no recuerda su acceso? Comuníquese con Recursos Humanos o con el administrador.</div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/supabase-config.js"></script><script src="assets/auth.js"></script></body></html>
