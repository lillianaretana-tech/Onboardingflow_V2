<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0B132B">
<title>LillyTech OnboardFlow | Inducción por video</title>
<style>
:root{--navy:#0B132B;--navy2:#1B294D;--ivory:#FAF8F2;--copper:#C9782A;--copper2:#E4A35F;--ink:#242936;--muted:#667085;--surface:#fff;--soft:#F2F1EC;--line:#E7E4DC;--success:#16835D;--warning:#C98A14;--danger:#C4473A;--shadow:0 14px 38px rgba(11,19,43,.10);--display:Georgia,"Times New Roman",serif;--body:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--ivory);color:var(--ink);font-family:var(--body);line-height:1.45}
.top{background:var(--navy);color:#fff;padding:14px 16px}.top-inner{max-width:640px;margin:auto;display:flex;align-items:center;gap:11px}
.mark{width:42px;height:42px;border-radius:13px;background:var(--copper);display:grid;place-items:center;font-family:var(--display);font-size:19px;font-weight:800}
.brand strong{font-family:var(--display);font-size:19px;display:block}.brand small{color:#d7dce6}
.shell{max-width:640px;margin:auto;padding:26px 16px 60px}
.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:26px;box-shadow:var(--shadow);margin-bottom:18px}
h1{font-family:var(--display);color:var(--navy);font-size:26px;margin:0 0 6px}
h2{font-family:var(--display);color:var(--navy);font-size:19px;margin:0 0 10px}
.lead{color:var(--muted);font-size:15px;margin:0 0 20px}
label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px}
input{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:17px;margin-bottom:16px}
button{width:100%;padding:15px;border:none;border-radius:12px;background:var(--copper);color:#fff;font-weight:800;font-size:16px;cursor:pointer}
button:disabled{opacity:.6}
.result{border-radius:16px;padding:14px 18px;margin-top:14px;font-size:14px}
.result.err{background:#fcecea;color:var(--danger);border:1px solid #f3c6bf}
.hidden{display:none}
.module-item{border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.module-item h3{font-size:16px;margin:0 0 10px;color:var(--navy)}
.player-box{position:relative;width:100%;padding-top:56.25%;border-radius:10px;overflow:hidden;background:#000}
.player-box iframe,.player-box video{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.bar{height:8px;background:var(--soft);border-radius:99px;margin-top:10px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--copper),var(--copper2));border-radius:99px;transition:width .3s}
.pct{font-size:13px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between}
.badge-done{color:var(--success);font-weight:700}
.summary{background:#e9f6ef;color:var(--success);border:1px solid #bfe6d3;border-radius:16px;padding:16px;text-align:center;font-weight:700;margin-top:6px}
.exam-pending{background:#fff3d2;color:#875e07;border:1px solid #f0dca0;border-radius:12px;padding:14px;font-size:14px;margin-top:10px}
</style>
</head>
<body>
<div class="top"><div class="top-inner"><div class="mark">LT</div><div class="brand"><strong>LillyTech OnboardFlow</strong><small>Inducción por video</small></div></div></div>
<div class="shell">
  <div class="card" id="identifyCard">
    <h1>Mi inducción</h1>
    <p class="lead">Escriba el código que le compartieron y su número de cédula.</p>
    <label for="codeInput">Código de acceso</label>
    <input id="codeInput" placeholder="Ej: K7MR-42" autocomplete="off">
    <label for="docInput">Cédula</label>
    <input id="docInput" placeholder="Ej: 1-2345-6789" autocomplete="off">
    <button id="submitBtn">Ver mi inducción</button>
    <div id="result" class="result err hidden"></div>
  </div>
  <div id="modulesWrap" class="hidden"></div>
</div>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-fallback.js"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/auth.js"></script>
<script>
(function(){'use strict';
const resultEl=document.getElementById('result'),btn=document.getElementById('submitBtn'),codeInput=document.getElementById('codeInput'),docInput=document.getElementById('docInput'),wrap=document.getElementById('modulesWrap'),card=document.getElementById('identifyCard');
let code='',docId='';

let ytApiReady=false,pendingRender=null;
window.onYouTubeIframeAPIReady=function(){ytApiReady=true;if(pendingRender){const d=pendingRender;pendingRender=null;renderModules(d)}};

function extractYouTubeId(url){
  if(!url)return null;
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{6,})/);
  return m?m[1]:null;
}

async function identify(){
  const c=codeInput.value.trim(),d=docInput.value.trim();
  if(!c||!d){if(!c)codeInput.focus();else docInput.focus();return}
  btn.disabled=true;btn.textContent='Buscando...';
  try{
    const{data,error}=await OnboardAuth.client.rpc('of_candidate_induction_videos',{p_code:c,p_document_id:d});
    if(error)throw error;
    if(!data.ok){resultEl.textContent=data.message;resultEl.classList.remove('hidden');return}
    code=c;docId=d;
    if(ytApiReady)renderModules(data);else pendingRender=data;
  }catch(e){resultEl.textContent='Ocurrió un error: '+e.message;resultEl.classList.remove('hidden')}
  finally{btn.disabled=false;btn.textContent='Ver mi inducción'}
}

function renderModules(data){
  card.classList.add('hidden');wrap.classList.remove('hidden');
  const allDone=data.modules.length>0&&data.modules.every(m=>m.status==='completed'||m.status==='approved');
  wrap.innerHTML=`<div class="card"><h2>Bienvenido/a, ${esc(data.candidate_name)}</h2><p class="lead">Complete cada bloque en orden. Su avance se guarda automáticamente.</p>${allDone?'<div class="summary">Ya completó todos los bloques de su inducción.</div>':''}</div>`+
    data.modules.map(m=>{
      if(m.is_exam){
        return `<div class="card module-item" data-module="${m.module_id}"><h3>${esc(m.name)} <small>(examen)</small></h3><div class="exam-pending">El examen en pantalla para este bloque estará disponible próximamente. Por ahora, coordine con Recursos Humanos cómo completarlo.</div></div>`;
      }
      if(!m.video_url){
        return `<div class="card module-item" data-module="${m.module_id}"><h3>${esc(m.name)}</h3><div class="exam-pending">Todavía no hay un video asignado a este bloque. Consulte con Recursos Humanos.</div></div>`;
      }
      const completed=m.status==='completed'||m.status==='approved';
      return `<div class="card module-item" data-module="${m.module_id}">
        <h3>${esc(m.name)} ${completed?'<span class="badge-done">· Completado</span>':''}</h3>
        <div class="player-box" data-player-box="${m.module_id}"></div>
        <div class="bar"><div class="bar-fill" data-bar="${m.module_id}" style="width:${completed?100:0}%"></div></div>
        <div class="pct"><span data-pct="${m.module_id}">${completed?100:0}% visto</span></div>
      </div>`;
    }).join('');

  data.modules.filter(m=>!m.is_exam&&m.video_url).forEach(m=>{
    const ytId=extractYouTubeId(m.video_url);
    const box=wrap.querySelector(`[data-player-box="${m.module_id}"]`);
    if(!box)return;
    let lastSent=m.status==='completed'?100:0,maxSeen=lastSent,pollTimer=null;

    const markProgress=pct=>{
      if(pct>maxSeen){
        maxSeen=pct;
        wrap.querySelector(`[data-bar="${m.module_id}"]`).style.width=pct+'%';
        wrap.querySelector(`[data-pct="${m.module_id}"]`).textContent=Math.round(pct)+'% visto';
      }
    };
    const sendProgress=()=>{
      if(maxSeen-lastSent<2&&maxSeen<95)return;
      lastSent=maxSeen;
      OnboardAuth.client.rpc('of_candidate_video_progress',{p_code:code,p_document_id:docId,p_module_id:m.module_id,p_watched_pct:maxSeen}).then(({data:d,error})=>{
        if(!error&&d&&d.ok&&maxSeen>=95){
          const h=wrap.querySelector(`[data-module="${m.module_id}"] h3`);
          if(h&&!h.textContent.includes('Completado'))h.innerHTML+=' <span class="badge-done">· Completado</span>';
        }
      });
    };

    if(ytId){
      const playerId=`yt-player-${m.module_id}`;
      const div=document.createElement('div');div.id=playerId;box.append(div);
      new YT.Player(playerId,{videoId:ytId,playerVars:{rel:0,modestbranding:1},events:{
        onStateChange:e=>{
          if(e.data===YT.PlayerState.PLAYING){
            if(pollTimer)clearInterval(pollTimer);
            pollTimer=setInterval(()=>{
              const dur=e.target.getDuration();
              if(dur>0)markProgress(Math.min(100,(e.target.getCurrentTime()/dur)*100));
            },3000);
          }else{
            if(pollTimer){clearInterval(pollTimer);pollTimer=null}
            if(e.data===YT.PlayerState.ENDED){markProgress(100);sendProgress()}
            else if(e.data===YT.PlayerState.PAUSED)sendProgress();
          }
        }
      }});
      setInterval(sendProgress,15000);
    }else{
      const el=document.createElement('video');el.controls=true;el.preload='metadata';el.playsInline=true;
      el.innerHTML=`<source src="${esc(m.video_url)}">`;box.append(el);
      el.addEventListener('timeupdate',()=>{if(el.duration)markProgress(Math.min(100,(el.currentTime/el.duration)*100))});
      el.addEventListener('pause',sendProgress);
      el.addEventListener('ended',()=>{markProgress(100);sendProgress()});
      setInterval(sendProgress,15000);
    }
  });
}

function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
btn.onclick=identify;
[codeInput,docInput].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')identify()}));
})();
</script>
</body>
</html>
